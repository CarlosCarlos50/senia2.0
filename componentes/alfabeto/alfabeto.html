<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfabeto - SeñIA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    
    <style>
        /* 1. VARIABLES DE COLOR (MODO OSCURO POR DEFECTO) */
        :root {
            --bg-color: #0b2926;
            --primary: #2de0d4;
            --primary-glow: rgba(45, 224, 212, 0.4);
            --text-main: #ffffff;
            --text-muted: #8abeb9;
            --card-bg: #113b37;
            --transition-speed: 0.4s;
        }

        /* 2. VARIABLES PARA MODO CLARO */
        [data-theme="light"] {
            --bg-color: #f0f4f4;
            --primary: #1a9e95;
            --primary-glow: rgba(26, 158, 149, 0.2);
            --text-main: #1a2e2c;
            --text-muted: #5a7a76;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* 3. BOTÓN DE TEMA  */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* 4. CONTENEDOR PRINCIPAL Y ENTRADA */
        #main-wrapper {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            flex: 1;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        #main-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .page-header {
            display: flex;
            align-items: center;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid var(--primary-glow);
            margin-bottom: 20px;
        }

        .back-btn {
            color: var(--primary);
            font-size: 1.5rem;
            text-decoration: none;
            margin-right: 15px;
            transition: transform 0.2s;
        }

        .page-header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
        }

        /* 5. VISOR DE SEÑAS */
        .viewer-box {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border: 1px solid var(--primary-glow);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: background-color var(--transition-speed), border var(--transition-speed);
            overflow: hidden;
        }

        .viewer-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 6. GRID DE LETRAS (TECLADO) */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 12px;
            justify-content: center;
            padding-bottom: 100px; /* Espacio para el scroll */
        }

        .key-btn {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid rgba(128, 128, 128, 0.2);
            border-radius: 12px;
            height: 55px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            transform: translateY(-2px);
        }

        .key-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-btn">
        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>

    <div id="main-wrapper">
        <header class="page-header">
            <a href="../../index.html" class="back-btn" onclick="transicionSalida(event)">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h1>Abecedario</h1>
        </header>

        <main>
            <div class="viewer-box" id="viewer">
                <div class="empty-state" style="text-align: center; color: var(--text-muted);">
                    <i class="bi bi-hand-index-thumb" style="font-size: 3rem; color: var(--primary); opacity: 0.5; display: block; margin-bottom: 10px;"></i>
                    <p>Selecciona una letra</p>
                </div>
            </div>

            <div class="keyboard-grid" id="keyboard"></div>
        </main>
    </div>

    



    <script>
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        // 1. GESTIÓN DEL MODO OSCURO (PERSISTENCIA)
        if (localStorage.getItem('theme') === 'light') {
            body.setAttribute('data-theme', 'light');
            themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        }

        themeBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                localStorage.setItem('theme', 'light');
            }
        });

        // 2. ANIMACIÓN DE ENTRADA Y SALIDA
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.getElementById("main-wrapper").classList.add("visible");
            }, 50);
        });

        function transicionSalida(e) {
            e.preventDefault();
            const dest = e.currentTarget.href;
            const wrapper = document.getElementById("main-wrapper");
            wrapper.classList.remove("visible");
            wrapper.style.opacity = "0";
            wrapper.style.transform = "translateY(20px)";
            setTimeout(() => window.location.href = dest, 400);
        }

        // 3. GENERACIÓN DEL TECLADO
        const letters = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");
        const board = document.getElementById("keyboard");
        const viewer = document.getElementById("viewer");
        const assetsPath = "../../assets/";

        letters.forEach((char) => {
            const btn = document.createElement("button");
            btn.className = "key-btn";
            btn.textContent = char;
            btn.onclick = () => loadSign(char, btn);
            board.appendChild(btn);
        });

        function loadSign(char, btn) {
            document.querySelectorAll(".key-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");

            const img = new Image();
            img.src = `${assetsPath}${char}.png`;

            img.onload = () => {
                viewer.innerHTML = "";
                viewer.appendChild(img);
            };

            img.onerror = () => {
                // Fallback a texto gigante si no encuentra la imagen
                viewer.innerHTML = `<h1 style="font-size: 8rem; color: var(--primary); margin: 0; text-shadow: 0 0 20px var(--primary-glow); animation: fadeIn 0.4s ease-in-out;">${char}</h1>`;
            };
        }
    </script>
</body>
</html>
