<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colores - SeñIA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    
    <style>
        /* 1. VARIABLES DE COLOR (MODO OSCURO POR DEFECTO) */
        :root {
            --bg-color: #0b2926;
            --primary: #2de0d4;
            --primary-glow: rgba(45, 224, 212, 0.4);
            --text-main: #ffffff;
            --text-muted: #8abeb9;
            --card-bg: #113b37;
            --transition-speed: 0.4s;
        }

        /* 2. VARIABLES PARA MODO CLARO */
        [data-theme="light"] {
            --bg-color: #f0f4f4;
            --primary: #1a9e95;
            --primary-glow: rgba(26, 158, 149, 0.2);
            --text-main: #1a2e2c;
            --text-muted: #5a7a76;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Transición para el cambio de modo Y para el efecto de color ambiental */
            transition: background-color 0.6s ease, color var(--transition-speed);
        }

        /* 3. BOTÓN DE TEMA FIJO */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* 4. TRANSICIÓN DE ENTRADA */
        #main-wrapper {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            flex: 1;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        #main-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .page-header {
            display: flex;
            align-items: center;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid var(--primary-glow);
            margin-bottom: 20px;
        }

        .back-btn {
            color: var(--primary);
            font-size: 1.5rem;
            text-decoration: none;
            margin-right: 15px;
            transition: transform 0.2s;
        }

        .page-header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
        }

        /* 5. VISOR DE IMAGEN */
        .viewer-box {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border: 1px solid var(--primary-glow);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .viewer-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 6. PALETA DE BOTONES */
        #palette {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            justify-content: center;
            padding-bottom: 40px;
        }

        .color-btn {
            height: 70px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .color-btn:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: rgba(255,255,255,0.5);
        }

        .color-btn[data-light="true"] {
            color: #1f2937;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-btn">
        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>

    <div id="main-wrapper">
        <header class="page-header">
            <a href="../../caracteristicas.html" class="back-btn" onclick="transicionSalida(event)">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h1>Colores</h1>
        </header>

        <main>
            <div class="viewer-box" id="viewer">
                <div class="empty-state" style="text-align: center; color: var(--text-muted);">
                    <i class="bi bi-palette-fill" style="font-size: 3rem; color: var(--primary); display: block; margin-bottom: 10px; opacity: 0.6;"></i>
                    <p>Toca un color para aprender su seña</p>
                </div>
            </div>

            <div id="palette"></div>
        </main>
    </div>

    

    <script>
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        // 1. PERSISTENCIA DEL MODO OSCURO
        if (localStorage.getItem('theme') === 'light') {
            body.setAttribute('data-theme', 'light');
            themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        }

        themeBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                localStorage.setItem('theme', 'light');
            }
        });

        // 2. ANIMACIONES DE ENTRADA Y SALIDA
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.getElementById("main-wrapper").classList.add("visible");
            }, 50);
        });

        function transicionSalida(e) {
            e.preventDefault();
            const dest = e.currentTarget.href;
            const wrapper = document.getElementById("main-wrapper");
            wrapper.classList.remove("visible");
            wrapper.style.opacity = "0";
            wrapper.style.transform = "translateY(20px)";
            setTimeout(() => window.location.href = dest, 400);
        }

        // 3. CONFIGURACIÓN DE COLORES
        const colors = [
            { name: "Rojo", hex: "#ef4444" },
            { name: "Azul", hex: "#3b82f6" },
            { name: "Verde", hex: "#22c55e" },
            { name: "Amarillo", hex: "#eab308", light: true },
            { name: "Naranja", hex: "#f97316" },
            { name: "Morado", hex: "#a855f7" },
            { name: "Blanco", hex: "#ffffff", light: true },
            { name: "Negro", hex: "#1f2937" },
        ];

        const palette = document.getElementById("palette");
        const viewer = document.getElementById("viewer");
        const assetsPath = "../../assets/";

        colors.forEach((c) => {
            const btn = document.createElement("button");
            btn.className = "color-btn";
            btn.style.backgroundColor = c.hex;
            btn.textContent = c.name;
            if (c.light) btn.setAttribute("data-light", "true");

            btn.onclick = () => {
                // Efecto de iluminación ambiental
                // Mezclamos el color con la opacidad actual del tema
                const opacity = body.getAttribute('data-theme') === 'light' ? "15" : "25";
                body.style.backgroundColor = c.hex + opacity; 
                
                viewer.style.borderColor = c.hex;
                viewer.style.boxShadow = `0 10px 40px ${c.hex}44`;

                const safeName = c.name
                    .toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "");
                
                viewer.innerHTML = `<img src="${assetsPath}${safeName}.jpeg" onerror="this.src='${assetsPath}${safeName}.png'; this.onerror=function(){ this.parentNode.innerHTML='<h1 style=color:${c.hex}>${c.name}</h1>' }">`;
            };
            palette.appendChild(btn);
        });
    </script>
</body>
</html>
