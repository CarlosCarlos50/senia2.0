<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Diccionario - SeñIA</title>
        <link rel="stylesheet" href="../../style.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <style>
            /* ========== VARIABLES DE TEMA (MODO OSCURO POR DEFECTO) ========== */
            :root {
                --bg-color: #0b2926;
                --primary-color: #2de0d4;
                --primary-glow: rgba(45, 224, 212, 0.3);
                --card-bg: #113b37;
                --text-main: #ffffff;
                --text-muted: #8abeb9;
                --input-bg: #0b2926;
                --shadow: 0 8px 32px rgba(0,0,0,0.3);
            }

            /* ========== VARIABLES MODO CLARO ========== */
            [data-theme="light"] {
                --bg-color: #f8fafc;
                --primary-color: #0d9488;
                --primary-glow: rgba(13, 148, 136, 0.15);
                --card-bg: #ffffff;
                --text-main: #0f172a;
                --text-muted: #64748b;
                --input-bg: #f1f5f9;
                --shadow: 0 4px 12px rgba(0,0,0,0.05);
            }

            body {
                background-color: var(--bg-color);
                color: var(--text-main);
                transition: background-color 0.3s ease, color 0.3s ease;
                font-family: inherit;
            }

            /* Header */
            .page-header {
                background-color: var(--bg-color);
                border-bottom: 1px solid var(--primary-glow);
                padding: 1rem;
            }
            .page-header h1 {
                color: var(--primary-color);
                font-weight: 700;
            }
            .back-btn { color: var(--primary-color) !important; }

            /* Botón Switch de Tema (Superior Derecha) */
            .theme-toggle {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                background: var(--card-bg);
                color: var(--primary-color);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                border: 1px solid var(--primary-glow);
                transition: all 0.2s;
            }
            .theme-toggle:hover {
                transform: scale(1.05);
                border-color: var(--primary-color);
            }

            /* Tarjetas */
            .cat-card, .word-card {
                cursor: pointer;
                transition: all 0.3s ease;
                border: 2px solid var(--primary-glow);
                border-radius: 20px;
                background: var(--card-bg);
                color: var(--text-main);
                box-shadow: var(--shadow);
            }
            .cat-card:hover, .word-card:hover {
                transform: translateY(-5px);
                border-color: var(--primary-color);
                box-shadow: 0 0 20px var(--primary-glow) !important;
            }
            .text-primary { color: var(--primary-color) !important; }
            .text-muted { color: var(--text-muted) !important; }

            .word-thumb {
                height: 140px;
                width: 100%;
                object-fit: cover;
                background: #000;
                border-bottom: 1px solid var(--primary-glow);
            }

            /* IA Asistente */
            .ai-minimal {
                margin: 1rem 0 1.5rem;
                padding: 1.2rem;
                background: var(--card-bg);
                border: 2px solid var(--primary-glow);
                border-radius: 18px;
                box-shadow: var(--shadow);
            }
            .ai-minimal input {
                background: var(--input-bg);
                border: 1px solid var(--primary-glow);
                color: var(--text-main);
                border-radius: 10px;
            }
            .ai-minimal button {
                background: var(--primary-color);
                color: white;
                font-weight: bold;
                border-radius: 10px;
            }

            /* Modal */
            .modal-content {
                background-color: var(--bg-color);
                color: var(--text-main);
                border-radius: 25px;
                border: 2px solid var(--primary-color);
            }
            .highlight-word { color: var(--primary-color); font-weight: 800; }
            .tip-box {
                background-color: var(--primary-glow);
                color: var(--text-main);
                padding: 10px;
                border-radius: 12px;
                border: 1px solid var(--primary-color);
            }

            .btn-back-grid {
                background: var(--card-bg);
                color: var(--primary-color);
                border: 1px solid var(--primary-glow);
            }
        </style>
    </head>
    <body data-theme="dark">

        <header class="page-header">
            <div class="container d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <a href="../../caracteristicas.html" class="back-btn me-3">
                        <i class="bi bi-arrow-left fs-3"></i>
                    </a>
                    <h1 class="m-0 fs-4">Diccionario</h1>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
                    <i class="bi bi-sun-fill" id="theme-icon"></i>
                </button>
            </div>
        </header>

        <div class="container">
            <div class="ai-minimal">
                <div class="fw-bold mb-2 text-primary">
                    <i class="bi bi-stars"></i> Asistente IA LSM
                </div>
                <div class="input-group">
                    <input type="text" id="ai-input" class="form-control shadow-none" placeholder="¿Cómo se dice...?" />
                    <button id="ai-btn" class="btn px-4" onclick="preguntarIA()">Preguntar</button>
                </div>
                <div id="ai-result" class="mt-2 small text-muted"></div>
            </div>

            <div id="view-categories">
                <div class="text-center mb-4">
                    <h4 class="fw-bold">Explora Categorías</h4>
                    <p class="small text-muted">Selecciona un tema para aprender señas</p>
                </div>
                <div id="categories-container" class="row g-3"></div>
            </div>

            <div id="view-words" class="d-none">
                <div class="d-flex align-items-center mb-3">
                    <button class="btn btn-back-grid rounded-circle me-3" style="width: 40px; height: 40px" onclick="showCategories()">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <div>
                        <h2 id="cat-title" class="fw-bold m-0 text-primary" style="font-size: 1.5rem"></h2>
                        <small class="text-muted">Toca para ver la seña</small>
                    </div>
                </div>
                <div id="words-grid" class="row g-3"></div>
            </div>
        </div>

        <div class="modal fade" id="signModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content p-3">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold">Aprendiendo LSM</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter: var(--close-btn-filter)"></button>
                    </div>
                    <div class="modal-body text-center">
                        <p class="mb-3">¿Cómo se dice <span id="modalWordName" class="highlight-word"></span>?</p>
                        <div class="rounded-3 overflow-hidden border border-2 border-primary">
                            <img src="" id="modalImg" class="img-fluid" />
                        </div>
                        <div class="tip-box mt-3 small">
                            <i class="bi bi-lightbulb-fill me-1"></i> Intenta repetir el movimiento varias veces.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../../data.js"></script>
        <script>
            <script>
    // LÓGICA DE TEMAS 
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        const isDark = body.getAttribute('data-theme') === 'dark';
        if (isDark) {
            body.setAttribute('data-theme', 'light');
            icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        }
    }

    // NUEVO ASISTENTE IA SeñIA
   <script>
    async function preguntarIA() {
        const input = document.getElementById('ai-input');
        const resultDiv = document.getElementById('ai-result');
        const btn = document.getElementById('ai-btn');
        const pregunta = input.value.trim();

        if (!pregunta) {
            resultDiv.style.display = 'block';
            resultDiv.textContent = 'Escribe una pregunta sobre señas 😊';
            return;
        }

        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<small>Pensando...</small>';
        btn.disabled = true;

        const contexto = "Eres un asistente de la app SeñIA. Responde breve sobre Lengua de Señas Mexicana (LSM).";
        
        // USA ESTA KEY (Asegúrate que sea válida en Google AI Studio)
        const API_KEY = 'AIzaSyDx6MinlSJPnvBirJAKxFWwZulbRY2e7jk';
        const modelo = 'gemini-1.5-flash'; 

        try {
            // La URL DEBE usar comillas invertidas ` ` para que funcione el ${modelo}
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: contexto + "\n\nPregunta: " + pregunta }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            const texto = data.candidates[0].content.parts[0].text;
            resultDiv.textContent = texto;

        } catch (err) {
            console.error("ERROR DETECTADO:", err);
            resultDiv.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    }

    // Vinculamos el botón manualmente para asegurar que funcione
    document.getElementById('ai-btn').onclick = preguntarIA;
</script>
    </body>
</html>
