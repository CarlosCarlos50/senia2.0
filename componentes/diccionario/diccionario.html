<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Diccionario - SeñIA</title>
        <link rel="stylesheet" href="../../style.css" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
        <style>
            :root { --bg-color: #0b2926; --primary-color: #2de0d4; --primary-glow: rgba(45, 224, 212, 0.3); --card-bg: #113b37; --text-main: #ffffff; --text-muted: #8abeb9; --input-bg: #0b2926; --shadow: 0 8px 32px rgba(0,0,0,0.3); }
            [data-theme="light"] { --bg-color: #f8fafc; --primary-color: #0d9488; --primary-glow: rgba(13, 148, 136, 0.15); --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --input-bg: #f1f5f9; --shadow: 0 4px 12px rgba(0,0,0,0.05); }
            body { background-color: var(--bg-color); color: var(--text-main); transition: background-color 0.3s ease; font-family: sans-serif; }
            .page-header { background-color: var(--bg-color); border-bottom: 1px solid var(--primary-glow); padding: 1rem; }
            .theme-toggle { width: 40px; height: 40px; border-radius: 10px; background: var(--card-bg); color: var(--primary-color); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--primary-glow); }
            .cat-card, .word-card { cursor: pointer; transition: all 0.3s ease; border: 2px solid var(--primary-glow); border-radius: 20px; background: var(--card-bg); box-shadow: var(--shadow); }
            .cat-card:hover, .word-card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
            .word-thumb { height: 140px; width: 100%; object-fit: cover; border-radius: 18px 18px 0 0; border-bottom: 1px solid var(--primary-glow); }
            .ai-minimal { margin: 1rem 0; padding: 1.2rem; background: var(--card-bg); border: 2px solid var(--primary-glow); border-radius: 18px; }
            .ai-minimal input { background: var(--input-bg); border: 1px solid var(--primary-glow); color: var(--text-main); }
            .ai-minimal button { background: var(--primary-color); color: white; font-weight: bold; }
            .modal-content { background-color: var(--bg-color); color: var(--text-main); border-radius: 25px; border: 2px solid var(--primary-color); }
            .highlight-word { color: var(--primary-color); font-weight: 800; }
        </style>
    </head>
    <body data-theme="dark">

        <header class="page-header">
            <div class="container d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <a href="../../caracteristicas.html" class="text-primary me-3"><i class="bi bi-arrow-left fs-3"></i></a>
                    <h1 class="m-0 fs-4 text-primary">Diccionario</h1>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()"><i class="bi bi-sun-fill" id="theme-icon"></i></button>
            </div>
        </header>

        <div class="container">
            <div class="ai-minimal">
                <div class="fw-bold mb-2 text-primary"><i class="bi bi-stars"></i> Asistente IA SeñIA</div>
                <div class="input-group">
                    <input type="text" id="ai-input" class="form-control" placeholder="¿Cómo se dice...?" />
                    <button id="ai-btn" class="btn px-4" onclick="preguntarIA()">Preguntar</button>
                </div>
                <div id="ai-result" class="mt-2 small text-muted"></div>
            </div>

            <div id="view-categories">
                <div class="text-center mb-4">
                    <h4 class="fw-bold">Explora Categorías</h4>
                    <p class="small text-muted">Aprende temas específicos en LSM</p>
                </div>
                <div id="categories-container" class="row g-3"></div>
            </div>

            <div id="view-words" class="d-none">
                <div class="d-flex align-items-center mb-3">
                    <button class="btn btn-outline-primary rounded-circle me-3" onclick="showCategories()"><i class="bi bi-arrow-left"></i></button>
                    <h2 id="cat-title" class="fw-bold m-0 text-primary" style="font-size: 1.5rem"></h2>
                </div>
                <div id="words-grid" class="row g-3"></div>
            </div>
        </div>

        <div class="modal fade" id="signModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content p-3">
                    <div class="modal-body text-center">
                        <p class="mb-3 fs-5">¿Cómo se dice <span id="modalWordName" class="highlight-word"></span>?</p>
                        <div class="rounded-3 overflow-hidden border border-2 border-primary">
                            <img src="" id="modalImg" class="img-fluid" />
                        </div>
                        <button type="button" class="btn btn-primary mt-3 w-100" data-bs-dismiss="modal">Entendido</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../../data.js"></script>
        <script>
            // CONFIGURACIÓN DE RUTAS
            const assetsPath = "../../assets/";

            // TEMA
            function toggleTheme() {
                const body = document.body;
                const icon = document.getElementById('theme-icon');
                if (body.getAttribute('data-theme') === 'dark') {
                    body.setAttribute('data-theme', 'light');
                    icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                } else {
                    body.setAttribute('data-theme', 'dark');
                    icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                }
            }

            // CARGAR DICCIONARIO (Solo si dictionary existe en data.js)
            const catsContainer = document.getElementById("categories-container");
            if (typeof dictionary !== 'undefined') {
                for (const key in dictionary) {
                    const cat = dictionary[key];
                    const col = document.createElement("div");
                    col.className = "col-6 col-md-4";
                    col.innerHTML = `
                        <div class="cat-card h-100 p-4 text-center" onclick="loadCategory('${key}')">
                            <div class="fs-1 text-primary mb-2"><i class="bi ${cat.icon}"></i></div>
                            <h5 class="fw-bold m-0 small">${cat.title}</h5>
                        </div>`;
                    catsContainer.appendChild(col);
                }
            }

            function loadCategory(key) {
                const cat = dictionary[key];
                document.getElementById("cat-title").textContent = cat.title;
                const grid = document.getElementById("words-grid");
                grid.innerHTML = "";
                cat.items.forEach(item => {
                    const col = document.createElement("div");
                    col.className = "col-6 col-md-4 col-lg-3";
                    col.innerHTML = `
                        <div class="word-card h-100" onclick="openModal('${item.word}', '${assetsPath + item.sign}')">
                            <img src="${assetsPath + item.image}" class="word-thumb" onerror="this.src='https://placehold.co/200?text=Error'">
                            <div class="p-2 text-center fw-bold small">${item.word}</div>
                        </div>`;
                    grid.appendChild(col);
                });
                document.getElementById("view-categories").classList.add("d-none");
                document.getElementById("view-words").classList.remove("d-none");
            }

            function showCategories() {
                document.getElementById("view-words").classList.add("d-none");
                document.getElementById("view-categories").classList.remove("d-none");
            }

            function openModal(word, src) {
                document.getElementById("modalWordName").innerText = `"${word}"`;
                document.getElementById("modalImg").src = src;
                new bootstrap.Modal(document.getElementById("signModal")).show();
            }

            // IA ASISTENTE
            async function preguntarIA() {
                const input = document.getElementById('ai-input');
                const resultDiv = document.getElementById('ai-result');
                const btn = document.getElementById('ai-btn');
                const pregunta = input.value.trim();

                if (!pregunta) return;

                resultDiv.innerHTML = 'Pensando...';
                btn.disabled = true;

                // ¡Asegúrate de que esta Key sea la tuya!
                const API_KEY = 'AIzaSyDx6MinlSJPnvBirJAKxFWwZulbRY2e7jk'; 
                const modelo = 'gemini-1.5-flash';

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${API_KEY}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Eres un experto en LSM. Responde breve: " + pregunta }] }]
                        })
                    });
                    const data = await response.json();
                    if(data.candidates) {
                        resultDiv.innerText = data.candidates[0].content.parts[0].text;
                    } else {
                        resultDiv.innerText = "Error en la respuesta de la IA.";
                    }
                } catch (err) {
                    resultDiv.innerHTML = '<span class="text-danger">Error de conexión.</span>';
                } finally {
                    btn.disabled = false;
                }
            }
        </script>
    </body>
</html>
