<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Diccionario - SeñIA</title>
        <!-- CSS Global -->
        <link rel="stylesheet" href="../../style.css" />
        <!-- Bootstrap Grid Only -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
        
        <style>
            /* ========== VARIABLES DE TEMA (MODO OSCURO POR DEFECTO) ========== */
            :root {
                --bg-color: #0b2926;
                --primary-color: #2de0d4;
                --primary-glow: rgba(45, 224, 212, 0.3);
                --card-bg: #113b37;
                --text-main: #ffffff;
                --text-muted: #8abeb9;
                --input-bg: #0b2926;
                --shadow: 0 8px 32px rgba(0,0,0,0.3);
            }

            /* ========== VARIABLES MODO CLARO ========== */
            [data-theme="light"] {
                --bg-color: #f8fafc;
                --primary-color: #0d9488;
                --primary-glow: rgba(13, 148, 136, 0.15);
                --card-bg: #ffffff;
                --text-main: #0f172a;
                --text-muted: #64748b;
                --input-bg: #f1f5f9;
                --shadow: 0 4px 12px rgba(0,0,0,0.05);
            }

            body {
                background-color: var(--bg-color);
                color: var(--text-main);
                transition: background-color 0.3s ease, color 0.3s ease;
                font-family: inherit;
                min-height: 100vh;
            }

            a { text-decoration: none; }

            .page-header {
                background-color: var(--bg-color);
                border-bottom: 1px solid var(--primary-glow);
                padding: 1rem 0;
                color: var(--primary-color);
            }

            .page-header h1 {
                color: var(--primary-color);
                font-weight: 700;
            }

            .back-btn {
                color: var(--primary-color) !important;
                font-size: 1.8rem;
            }

            /* Tarjetas de Categoría */
            .cat-card {
                cursor: pointer;
                transition: all 0.3s ease;
                border: 2px solid var(--primary-glow);
                border-radius: 20px;
                background: var(--card-bg);
                color: var(--text-main);
                box-shadow: var(--shadow);
                overflow: hidden;
            }

            .cat-card:hover {
                transform: translateY(-5px);
                border-color: var(--primary-color);
                box-shadow: 0 0 20px var(--primary-glow) !important;
            }

            /* Tarjetas de Palabras */
            .word-card {
                cursor: pointer;
                transition: all 0.3s ease;
                border: 2px solid var(--primary-glow);
                border-radius: 20px;
                background: var(--card-bg);
                color: var(--text-main);
                box-shadow: var(--shadow);
                overflow: hidden;
            }

            .word-card:hover {
                transform: translateY(-5px);
                border-color: var(--primary-color);
                box-shadow: 0 0 20px var(--primary-glow) !important;
            }

            .word-card:active {
                transform: scale(0.98);
            }

            .word-thumb {
                height: 140px;
                width: 100%;
                object-fit: cover;
                background: #000;
                border-bottom: 1px solid var(--primary-glow);
            }

            /* Text helpers */
            .text-primary { color: var(--primary-color) !important; }
            .text-muted   { color: var(--text-muted) !important; }

            /* Modal */
            .modal-content {
                background-color: var(--bg-color);
                color: var(--text-main);
                border-radius: 25px;
                border: 2px solid var(--primary-color);
                box-shadow: var(--shadow);
            }

            .instruction-text {
                font-size: 1.1rem;
                color: var(--text-main);
                margin-bottom: 15px;
            }

            .highlight-word {
                color: var(--primary-color);
                font-weight: 800;
            }

            .tip-box {
                background-color: var(--primary-glow);
                color: var(--text-main);
                padding: 10px;
                border-radius: 12px;
                border: 1px solid var(--primary-color);
                font-size: 0.9rem;
                margin-top: 15px;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }

            .btn-primary {
                background-color: var(--primary-color);
                border-color: var(--primary-color);
                color: #000;
                font-weight: 600;
            }

            .btn-primary:hover {
                background-color: #24c0b4;
                border-color: #24c0b4;
            }

            .btn-back-grid {
                background: var(--card-bg);
                color: var(--primary-color);
                border: 1px solid var(--primary-glow);
            }

            .theme-toggle {
                width: 42px;
                height: 42px;
                border-radius: 12px;
                background: var(--card-bg);
                color: var(--primary-color);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                border: 1px solid var(--primary-glow);
                transition: all 0.2s;
            }

            .theme-toggle:hover {
                transform: scale(1.05);
                border-color: var(--primary-color);
            }

            /* Estilos para el Asistente IA */
            .ai-minimal {
                margin: 1rem 0 1.5rem;
                padding: 1.2rem;
                background: var(--card-bg);
                border: 2px solid var(--primary-glow);
                border-radius: 18px;
                box-shadow: var(--shadow);
            }

            .ai-minimal input {
                background: var(--input-bg);
                border: 1px solid var(--primary-glow);
                color: var(--text-main);
                border-radius: 10px;
            }

            .ai-minimal button {
                background: var(--primary-color);
                color: #000;
                font-weight: bold;
                border-radius: 10px;
            }

            .ai-error {
                color: #ff6b6b;
                font-weight: 500;
            }
        </style>
    </head>
    <body data-theme="dark">

        <header class="page-header">
            <div class="container d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <a href="../../index.html" class="back-btn me-3">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h1 class="m-0">Diccionario</h1>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
                    <i class="bi bi-sun-fill" id="theme-icon"></i>
                </button>
            </div>
        </header>

        <div class="container py-4">

            <!-- Asistente IA -->
            <div class="ai-minimal">
                <div class="fw-bold mb-2 text-primary">
                    <i class="bi bi-stars"></i> Asistente IA LSM
                </div>
                <div class="input-group">
                    <input type="text" id="ai-input" class="form-control shadow-none" placeholder="¿Cómo se dice...?" />
                    <button id="ai-btn" class="btn px-4">Preguntar</button>
                </div>
                <div id="ai-result" class="mt-3 small text-muted" style="display: none;"></div>
            </div>

            <!-- 1. Vista Categorías -->
            <div id="view-categories">
                <!-- Mensaje de bienvenida amigable -->
                <div class="text-center mb-4">
                    <h4 class="fw-bold text-primary">
                        ¿Qué quieres aprender hoy?
                    </h4>
                    <p class="text-muted small">
                        Selecciona un tema para ver las palabras disponibles.
                    </p>
                </div>

                <div id="categories-container" class="row g-3">
                    <!-- Se llena con JS -->
                </div>
            </div>

            <!-- 2. Vista Palabras -->
            <div id="view-words" class="d-none">
                <div class="d-flex align-items-center mb-4">
                    <button
                        class="btn btn-back-grid rounded-circle me-3 shadow-sm"
                        style="width: 44px; height: 44px"
                        onclick="showCategories()"
                    >
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <div>
                        <h2
                            id="cat-title"
                            class="text-primary fw-bold m-0"
                            style="font-size: 1.6rem"
                        ></h2>
                        <small class="text-muted"
                            >Toca una imagen para ver la seña</small
                        >
                    </div>
                </div>

                <div id="words-grid" class="row g-3"></div>
            </div>
        </div>

        <!-- Modal Educativo -->
        <div class="modal fade" id="signModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content p-4">
                    <div class="modal-header border-0 pb-2">
                        <h5 class="modal-title fw-bold">Aprendiendo LSM</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>

                    <div class="modal-body text-center">
                        <p class="instruction-text mb-3">
                            ¿Cómo se dice
                            <span id="modalWordName" class="highlight-word"
                                >...</span
                            >?
                        </p>
                        <p class="text-muted small mb-3">
                            Observa la imagen y replica el movimiento:
                        </p>

                        <div
                            class="rounded-3 overflow-hidden border border-2"
                            style="border-color: var(--primary-color);"
                        >
                            <img
                                src=""
                                id="modalImg"
                                class="img-fluid"
                                style="max-height: 350px;"
                            />
                        </div>

                        <div class="tip-box">
                            <i class="bi bi-lightbulb-fill me-1"></i>
                            <strong>Tip:</strong> Intenta hacerlo frente a un
                            espejo.
                        </div>
                    </div>

                    <div class="modal-footer border-0 justify-content-center pt-2">
                        <button
                            type="button"
                            class="btn btn-primary rounded-pill px-5 py-2"
                            data-bs-dismiss="modal"
                        >
                            ¡Entendido!
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../../data.js"></script>
        <script>
            // Toggle tema
            function toggleTheme() {
                const body = document.body;
                const icon = document.getElementById('theme-icon');
                const isDark = body.getAttribute('data-theme') === 'dark';
                
                if (isDark) {
                    body.setAttribute('data-theme', 'light');
                    icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                } else {
                    body.setAttribute('data-theme', 'dark');
                    icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                }
            }

            const viewCats = document.getElementById("view-categories");
            const catsContainer = document.getElementById("categories-container");
            const viewWords = document.getElementById("view-words");
            const assetsPath = "../../";

            // Cargar Categorías
            for (const key in dictionary) {
                const cat = dictionary[key];
                const col = document.createElement("div");
                col.className = "col-6 col-md-4";
                col.innerHTML = `
                <div class="card cat-card h-100 p-3 text-center" onclick="loadCategory('${key}')">
                    <div class="fs-1 text-primary mb-3"><i class="bi ${cat.icon}"></i></div>
                    <h5 class="fw-bold m-0" style="font-size: 1.1rem;">${cat.title}</h5>
                    <small class="text-muted" style="font-size: 0.85rem;">${cat.items.length} palabras</small>
                </div>
            `;
                catsContainer.appendChild(col);
            }

            function loadCategory(key) {
                const cat = dictionary[key];
                document.getElementById("cat-title").textContent = cat.title;
                const grid = document.getElementById("words-grid");
                grid.innerHTML = "";

                cat.items.forEach((item) => {
                    const col = document.createElement("div");
                    col.className = "col-6 col-md-4 col-lg-3";
                    const imgSrc = assetsPath + item.image;

                    col.innerHTML = `
                    <div class="card word-card h-100" onclick="openModal('${item.word}', '${assetsPath + item.sign}')">
                        <div style="position: relative;">
                            <img src="${imgSrc}" class="word-thumb" onerror="this.src='https://placehold.co/200?text=Sin+Imagen'">
                            <div style="position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); border-radius: 50%; padding: 6px; backdrop-filter: blur(2px);">
                                <i class="bi bi-eye-fill text-white fs-5"></i>
                            </div>
                        </div>
                        <div class="card-body p-2 text-center">
                            <strong class="small fw-bold" style="color: var(--text-main);">${item.word}</strong>
                        </div>
                    </div>
                `;
                    grid.appendChild(col);
                });

                viewCats.classList.add("d-none");
                viewWords.classList.remove("d-none");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function showCategories() {
                viewWords.classList.add("d-none");
                viewCats.classList.remove("d-none");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function openModal(word, src) {
                document.getElementById("modalWordName").innerText = `"${word}"`;
                document.getElementById("modalImg").src = src;
                new bootstrap.Modal(document.getElementById("signModal")).show();
            }

            // Revisar URL por si viene del buscador
            const params = new URLSearchParams(window.location.search);
            if (params.has("categoria")) loadCategory(params.get("categoria"));

// Asistente IA - Configuración SeñIA 2026
// =============================================
async function preguntarIA() {
    const input = document.getElementById('ai-input');
    const resultDiv = document.getElementById('ai-result');
    const btn = document.getElementById('ai-btn');
    const pregunta = input.value.trim();

    if (!pregunta) {
        resultDiv.style.display = 'block';
        resultDiv.textContent = 'Escribe una pregunta sobre señas 😊';
        return;
    }

    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '<div class="spinner-border spinner-border-sm text-primary" role="status"></div> <small>Consultando a SeñIA...</small>';
    btn.disabled = true;

    // Contexto optimizado para Lengua de Señas Mexicana
    const contexto = 
        "Eres un experto en Lengua de Señas Mexicana (LSM). Ayudas a usuarios de la app SeñIA. " +
        "Responde de forma breve, clara y positiva en español. " +
        "Si preguntan por una seña, describe brevemente la posición de las manos y el movimiento. " +
        "Si la pregunta no es sobre LSM, indica amablemente que tu especialidad es la lengua de señas.";

    // Configuración de API
    const API_KEY = 'AIzaSyAy1OJ5qk92lpyefSwzdHiBIcyLAtgPfQI'; 
    const modelo = 'gemini-1.5-flash'; 

    try {
        const url = `https://generativelanguage.googleapis.com/v1/models/${modelo}:generateContent?key=${API_KEY}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ 
                    parts: [{ text: contexto + "\n\nPregunta del usuario: " + pregunta }] 
                }],
                generationConfig: {
                    maxOutputTokens: 250,
                    temperature: 0.7
                }
            })
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error?.message || `Error HTTP ${response.status}`);
        }

        const data = await response.json();
        let texto = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || 'No pude obtener una respuesta en este momento.';
        
        // Limpieza básica de formato markdown si Gemini lo incluye
        texto = texto.replace(/[*#]/g, '').trim();
        
        resultDiv.innerHTML = `<i class="bi bi-chat-left-dots-fill me-2"></i> ${texto}`;
        
    } catch (err) {
        console.error("Detalle del error:", err);
        resultDiv.innerHTML = `<span class="ai-error"><i class="bi bi-exclamation-triangle"></i> Error: No se pudo conectar con el servicio. Verifica tu conexión o la configuración de la API.</span>`;
    } finally {
        btn.disabled = false;
    }
}

// Eventos de escucha
document.getElementById('ai-btn').addEventListener('click', preguntarIA);
document.getElementById('ai-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        preguntarIA();
    }
});
        </script>
    </body>
</html>
