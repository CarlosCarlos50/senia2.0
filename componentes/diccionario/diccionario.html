<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diccionario - SeñIA</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <style>
        :root {
            --bg-color: #0b2926;
            --primary: #2de0d4;
            --primary-glow: rgba(45, 224, 212, 0.4);
            --text-main: #ffffff;
            --text-muted: #8abeb9;
            --card-bg: #113b37;
            --transition-speed: 0.4s;
        }

        [data-theme="light"] {
            --bg-color: #f0f4f4;
            --primary: #1a9e95;
            --primary-glow: rgba(26, 158, 149, 0.2);
            --text-main: #1a2e2c;
            --text-muted: #5a7a76;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: all var(--transition-speed);
            min-height: 100vh;
        }

        /* BOTÓN TEMA */
        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
        }

        .page-header {
            display: flex;
            align-items: center;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 2px solid var(--primary-glow);
        }

        .back-btn { color: var(--primary); font-size: 1.5rem; margin-right: 15px; }

        /* CARDS */
        .cat-card, .word-card {
            background: var(--card-bg);
            border: 1px solid var(--primary-glow);
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cat-card:hover, .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .cat-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .word-thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 15px 15px 0 0;
        }

        /* MODAL */
        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 20px;
            color: var(--text-main);
        }

        .btn-primary { background: var(--primary); border: none; color: #0b2926; font-weight: bold; }
        
        .d-none { display: none !important; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-btn">
        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>

    <header class="page-header">
        <a href="../../caracteristicas.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
        <h1 class="h4 m-0 fw-bold">Diccionario SeñIA</h1>
    </header>

    <div class="container py-4">
        <div id="view-categories">
            <div class="text-center mb-4">
                <h2 class="h4 fw-bold" style="color: var(--primary)">¿Qué quieres aprender?</h2>
                <p class="small text-muted">Selecciona una categoría</p>
            </div>
            <div id="categories-container" class="row g-3">
                </div>
        </div>

        <div id="view-words" class="d-none">
            <div class="d-flex align-items-center mb-4">
                <button class="btn btn-sm btn-outline-info me-3" onclick="showCategories()">
                    <i class="bi bi-chevron-left"></i> Volver
                </button>
                <h2 id="cat-title" class="h4 m-0 fw-bold" style="color: var(--primary)"></h2>
            </div>
            <div id="words-grid" class="row g-3">
                </div>
        </div>
    </div>

    <div class="modal fade" id="signModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Aprende la seña</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="mb-3">Palabra: <span id="modalWordName" class="fw-bold text-info" style="font-size: 1.2rem;"></span></p>
                    <img src="" id="modalImg" class="img-fluid rounded shadow-lg" style="max-height: 300px;" />
                    <div class="mt-3 p-2 rounded" style="background: rgba(45,224,212,0.1); font-size: 0.85rem;">
                        <i class="bi bi-lightbulb"></i> <strong>Tip:</strong> Imita el movimiento frente al espejo.
                    </div>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">¡Lo tengo!</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../data.js"></script>

    <script>
        const catsContainer = document.getElementById("categories-container");
        const wordsGrid = document.getElementById("words-grid");
        const viewCats = document.getElementById("view-categories");
        const viewWords = document.getElementById("view-words");
        const assetsPath = "../../";

        // 1. RENDERIZAR CATEGORÍAS AL CARGAR
        function initDictionary() {
            if (typeof dictionary === 'undefined') {
                console.error("No se encontró el objeto 'dictionary' en data.js");
                return;
            }

            catsContainer.innerHTML = "";
            for (const key in dictionary) {
                const cat = dictionary[key];
                const col = document.createElement("div");
                col.className = "col-6 col-md-4";
                col.innerHTML = `
                    <div class="cat-card p-4 text-center h-100" onclick="loadCategory('${key}')">
                        <i class="bi ${cat.icon} cat-icon"></i>
                        <h6 class="fw-bold m-0">${cat.title}</h6>
                        <small class="text-muted">${cat.items.length} señas</small>
                    </div>
                `;
                catsContainer.appendChild(col);
            }
        }

        // 2. CARGAR PALABRAS DE UNA CATEGORÍA
        function loadCategory(key) {
            const cat = dictionary[key];
            document.getElementById("cat-title").textContent = cat.title;
            wordsGrid.innerHTML = "";

            cat.items.forEach(item => {
                const col = document.createElement("div");
                col.className = "col-6 col-md-4 col-lg-3";
                col.innerHTML = `
                    <div class="word-card h-100" onclick="openModal('${item.word}', '${assetsPath + item.sign}')">
                        <img src="${assetsPath + item.image}" class="word-thumb" onerror="this.src='https://placehold.co/300?text=${item.word}'">
                        <div class="p-2 text-center">
                            <span class="small fw-bold text-uppercase">${item.word}</span>
                        </div>
                    </div>
                `;
                wordsGrid.appendChild(col);
            });

            viewCats.classList.add("d-none");
            viewWords.classList.remove("d-none");
            window.scrollTo(0, 0);
        }

        function showCategories() {
            viewWords.classList.add("d-none");
            viewCats.classList.remove("d-none");
        }

        function openModal(word, signSrc) {
            document.getElementById("modalWordName").innerText = word;
            document.getElementById("modalImg").src = signSrc;
            new bootstrap.Modal(document.getElementById('signModal')).show();
        }

        // 3. TEMA OSCURO/CLARO
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');

        themeBtn.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
            }
        });

        // Iniciar
        initDictionary();
    </script>
</body>
</html>
