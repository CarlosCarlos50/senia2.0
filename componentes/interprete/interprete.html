<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeñIA - Traductor de Lengua de Señas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    
    <style>
        /* 1. VARIABLES DE COLOR (DEL SCRIPT 1) */
        :root {
            --bg-color: #0b2926;
            --primary: #2de0d4;
            --primary-glow: rgba(45, 224, 212, 0.4);
            --text-main: #ffffff;
            --text-muted: #8abeb9;
            --card-bg: #113b37;
            --transition-speed: 0.4s;
        }

        [data-theme="light"] {
            --bg-color: #f0f4f4;
            --primary: #1a9e95;
            --primary-glow: rgba(26, 158, 149, 0.2);
            --text-main: #1a2e2c;
            --text-muted: #5a7a76;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* 2. BOTÓN DE TEMA */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* 3. CONTENEDOR PRINCIPAL Y ANIMACIONES */
        #main-wrapper {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            flex: 1;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #main-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .page-header {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid var(--primary-glow);
            margin-bottom: 20px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            flex: 1;
            text-align: center;
        }

        /* 4. ÁREA DE RESULTADO */
        #resultado {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 15px 30px;
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--primary);
            min-height: 50px;
            text-align: center;
            border: 2px solid var(--primary-glow);
            box-shadow: 0 0 20px var(--primary-glow);
            width: 100%;
            max-width: 500px;
            transition: all 0.3s ease;
        }

        /* 5. CONTENEDOR DE VIDEO */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 4px solid var(--card-bg);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        /* Línea de escaneo decorativa */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scanning 3s infinite linear;
            z-index: 10;
            opacity: 0.5;
        }

        @keyframes scanning {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* 6. CONTROLES Y BOTONES */
        .controles {
            margin: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .instrucciones {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
            max-width: 450px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-btn">
        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>

    <div id="main-wrapper">
        <header class="page-header">
            <h1>SeñIA Traductor</h1>
        </header>

        <div class="controles">
            <button id="togglePuntos" class="btn"><i class="bi bi-dot"></i> Mostrar Puntos</button>
            <button id="toggleCamara" class="btn"><i class="bi bi-camera-video"></i> Cambiar Cámara</button>
        </div>
        
        <div id="resultado">HAZ CLIC PARA INICIAR</div>

        <div class="video-container">
            <div class="scan-line"></div>
            <video class="input_video"></video>
            <canvas class="output_canvas"></canvas>
        </div>

        <div class="instrucciones">
            <i class="bi bi-info-circle"></i><br>
            • Haz clic para activar la cámara<br>
            • Asegúrate de que haya buena iluminación<br>
            • Mantén tu mano dentro del recuadro
        </div>
    </div>

    <script>
        // ==================== LÓGICA DE TEMA (MODO OSCURO) ====================
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        if (localStorage.getItem('theme') === 'light') {
            body.setAttribute('data-theme', 'light');
            themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        }

        themeBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                localStorage.setItem('theme', 'light');
            }
        });

        // Animación de entrada
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.getElementById("main-wrapper").classList.add("visible");
            }, 50);
        });

        // ==================== LÓGICA FUNCIONAL (SIN CAMBIOS) ====================
        const API_URL = "https://senia-api.onrender.com/predecir";
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const resultadoDiv = document.getElementById('resultado');
        const ctx = canvasElement.getContext('2d');
        
        const letras = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "L", "M", "N", "O", "P", "R", "S", "T", "U", "V", "W", "Y"];
        
        let mostrarPuntos = false;
        let camaraFrontal = true;
        let cameraInstance = null;
        let handsInstance = null;
        let sistemaIniciado = false;
        
        canvasElement.width = 640;
        canvasElement.height = 480;
        
        const CONEXIONES_MANO = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];
        
        function dibujarLandmarks(landmarks) {
            if (!landmarks || landmarks.length === 0) return;
            ctx.strokeStyle = '#2de0d4'; // Color primario
            ctx.fillStyle = '#ffffff';
            ctx.lineWidth = 3;
            CONEXIONES_MANO.forEach(([inicio, fin]) => {
                const puntoInicio = landmarks[inicio];
                const puntoFin = landmarks[fin];
                ctx.beginPath();
                ctx.moveTo(puntoInicio.x * canvasElement.width, puntoInicio.y * canvasElement.height);
                ctx.lineTo(puntoFin.x * canvasElement.width, puntoFin.y * canvasElement.height);
                ctx.stroke();
            });
            landmarks.forEach(punto => {
                ctx.beginPath();
                ctx.arc(punto.x * canvasElement.width, punto.y * canvasElement.height, 4, 0, 2 * Math.PI);
                ctx.fill();
            });
        }
        
        function limpiarCanvas() {
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        }
        
        function togglePuntos() {
            mostrarPuntos = !mostrarPuntos;
            const btn = document.getElementById('togglePuntos');
            if (mostrarPuntos) {
                btn.innerHTML = '<i class="bi bi-dot"></i> Ocultar Puntos';
                canvasElement.style.display = 'block';
            } else {
                btn.innerHTML = '<i class="bi bi-dot"></i> Mostrar Puntos';
                canvasElement.style.display = 'none';
                limpiarCanvas();
            }
        }
        
        async function cambiarCamara() {
            if (!cameraInstance) return;
            try {
                await cameraInstance.stop();
                camaraFrontal = !camaraFrontal;
                cameraInstance = new Camera(videoElement, {
                    onFrame: async () => { await handsInstance.send({ image: videoElement }); },
                    width: 640, height: 480,
                    facingMode: camaraFrontal ? 'user' : 'environment'
                });
                await cameraInstance.start();
                document.getElementById('toggleCamara').innerHTML = camaraFrontal ? '<i class="bi bi-camera-video"></i> Cámara Trasera' : '<i class="bi bi-camera-video"></i> Cámara Frontal';
            } catch (error) {
                console.error('Error cambiando cámara:', error);
            }
        }
        
        async function iniciarSistema() {
            if (sistemaIniciado) return;
            try {
                sistemaIniciado = true;
                resultadoDiv.textContent = "Iniciando...";
                
                handsInstance = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });
                
                handsInstance.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 0,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });
                
                let ultimaPrediccion = '';
                let ultimoTiempo = 0;
                const intervaloMinimo = 400; 
                
                handsInstance.onResults((results) => {
                    ctx.save();
                    ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        if (mostrarPuntos) dibujarLandmarks(results.multiHandLandmarks[0]);
                        
                        const ahora = Date.now();
                        if (ahora - ultimoTiempo < intervaloMinimo) { ctx.restore(); return; }
                        
                        const landmarks = results.multiHandLandmarks[0];
                        const puntos = [];
                        landmarks.forEach(punto => puntos.push(punto.x, punto.y, punto.z));
                        
                        enviarPrediccion(puntos).then(data => {
                            if (data.indice >= 0 && data.indice < letras.length) {
                                const letra = letras[data.indice];
                                if (letra !== ultimaPrediccion) {
                                    resultadoDiv.textContent = "Seña: " + letra;
                                    resultadoDiv.style.boxShadow = "0 0 30px var(--primary)";
                                    ultimaPrediccion = letra;
                                }
                            }
                            ultimoTiempo = ahora;
                        }).catch(err => {
                            resultadoDiv.textContent = "Error API";
                        });
                    } else {
                        resultadoDiv.textContent = "✋ Muestra tu mano";
                        resultadoDiv.style.boxShadow = "none";
                        ultimaPrediccion = '';
                    }
                    ctx.restore();
                });
                
                cameraInstance = new Camera(videoElement, {
                    onFrame: async () => { await handsInstance.send({ image: videoElement }); },
                    width: 640, height: 480, facingMode: 'user'
                });
                
                await cameraInstance.start();
                resultadoDiv.textContent = "✅ ¡Listo! Empieza a signar";
                
                document.getElementById('togglePuntos').addEventListener('click', togglePuntos);
                document.getElementById('toggleCamara').addEventListener('click', cambiarCamara);
                
            } catch (error) {
                resultadoDiv.textContent = "❌ Error al iniciar";
                sistemaIniciado = false;
            }
        }
        
        async function enviarPrediccion(puntos) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ puntos: puntos })
            });
            return await response.json();
        }
        
        document.addEventListener('click', () => {
            if (!sistemaIniciado) iniciarSistema();
        }, { once: true });
    </script>
</body>
</html>
