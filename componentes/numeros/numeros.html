<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Números - SeñIA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    
    <style>
        /* 1. VARIABLES DE COLOR (MODO OSCURO POR DEFECTO) */
        :root {
            --bg-color: #0b2926;
            --primary: #2de0d4;
            --primary-glow: rgba(45, 224, 212, 0.4);
            --text-main: #ffffff;
            --text-muted: #8abeb9;
            --card-bg: #113b37;
            --transition-speed: 0.4s;
        }

        /* 2. VARIABLES PARA MODO CLARO */
        [data-theme="light"] {
            --bg-color: #f0f4f4;
            --primary: #1a9e95;
            --primary-glow: rgba(26, 158, 149, 0.2);
            --text-main: #1a2e2c;
            --text-muted: #5a7a76;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* 3. BOTÓN DE TEMA FIJO */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* 4. TRANSICIÓN DE ENTRADA */
        #main-wrapper {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            flex: 1;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        #main-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 5. ENCABEZADO Y CONTROLES */
        .page-header {
            display: flex;
            align-items: center;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid var(--primary-glow);
            margin-bottom: 20px;
        }

        .back-btn {
            color: var(--primary);
            font-size: 1.5rem;
            text-decoration: none;
            margin-right: 15px;
            transition: transform 0.2s;
        }

        .page-header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .mode-switch {
            display: flex;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 5px;
            margin-bottom: 25px;
            border: 1px solid var(--primary-glow);
        }

        .mode-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* 6. VISOR */
        .viewer-box {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border: 1px solid var(--primary-glow);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .viewer-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 7. TECLADOS */
        .keyboard-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            animation: fadeIn 0.5s ease-out;
        }

        .key-btn {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid rgba(128, 128, 128, 0.2);
            border-radius: 12px;
            height: 55px;
            min-width: 55px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
        }

        .key-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .key-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* QUIZ PANEL */
        #quiz-panel {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        #quiz-score {
            color: var(--primary);
            font-size: 1.3rem;
            margin: 0 0 20px 0;
        }
    </style>
</head>
<body>
<script type="module">
    import { auth } from '../../js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = 'login.html';
        }
    });
</script>
    <button class="theme-toggle" id="theme-btn">
        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>

    <div id="main-wrapper">
        <header class="page-header">
            <a href="../../index.html" class="back-btn" onclick="transicionSalida(event)">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h1>Números</h1>
        </header>

        <main>
            <div class="mode-switch">
                <button class="mode-btn active" onclick="setMode('explore')" id="btn-explore">
                    <i class="bi bi-search"></i> Explorar
                </button>
                <button class="mode-btn" onclick="setMode('quiz')" id="btn-quiz">
                    <i class="bi bi-controller"></i> Quiz
                </button>
            </div>

            <div class="viewer-box" id="viewer">
                <div class="empty-state" style="text-align: center; color: var(--text-muted);">
                    <i class="bi bi-123" style="font-size: 3rem; color: var(--primary); display: block; opacity: 0.5;"></i>
                    <p>Selecciona un número</p>
                </div>
            </div>

            <div class="keyboard-grid" id="keyboard"></div>

            <div id="quiz-panel">
                <h3 id="quiz-score">Puntos: 0</h3>
                <div class="keyboard-grid" id="quiz-options"></div>
            </div>
        </main>
    </div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        // 1. MODO OSCURO PERSISTENTE
        if (localStorage.getItem('theme') === 'light') {
            body.setAttribute('data-theme', 'light');
            themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        }

        themeBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                localStorage.setItem('theme', 'light');
            }
        });

        // 2. ENTRADA/SALIDA
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.getElementById("main-wrapper").classList.add("visible");
            }, 50);
        });

        function transicionSalida(e) {
            e.preventDefault();
            const dest = e.currentTarget.href;
            const wrapper = document.getElementById("main-wrapper");
            wrapper.classList.remove("visible");
            wrapper.style.opacity = "0";
            wrapper.style.transform = "translateY(20px)";
            setTimeout(() => window.location.href = dest, 400);
        }

        // 3. NÚMEROS Y LÓGICA
        const numbers = Array.from({ length: 10 }, (_, i) => i + 1);
        const board = document.getElementById("keyboard");
        const viewer = document.getElementById("viewer");
        const quizPanel = document.getElementById("quiz-panel");
        const quizOptions = document.getElementById("quiz-options");
        const assetsPath = "../../assets/";
        let currentScore = 0;
        let currentTarget = null;

        // Iniciar botones exploración
        numbers.forEach((num) => {
            const btn = document.createElement("button");
            btn.className = "key-btn";
            btn.textContent = num;
            btn.onclick = () => {
                document.querySelectorAll("#keyboard .key-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                // Le pasamos 'false' porque NO es el quiz
                showImage(num, false);
            };
            board.appendChild(btn);
        });

        // Modificamos showImage para que acepte un segundo parámetro 'isQuiz'
        function showImage(num, isQuiz = false) {
            viewer.style.boxShadow = "0 0 30px var(--primary-glow)";
            const img = new Image();
            
            // Si estamos en el quiz, busca la imagen recortada (ej. quiz_1.jpeg), si no, usa la normal (ej. 1.jpeg)
            if (isQuiz) {
                img.src = `${assetsPath}quiz_${num}.jpeg`;
            } else {
                img.src = `${assetsPath}${num}.jpeg`;
            }

            img.onload = () => { viewer.innerHTML = ""; viewer.appendChild(img); };
            img.onerror = () => {
                viewer.innerHTML = `<h1 style="font-size: 8rem; color: var(--primary); text-shadow: 0 0 20px var(--primary-glow);">${num}</h1>`;
            };
        }

        function setMode(mode) {
            document.querySelectorAll(".mode-btn").forEach((b) => b.classList.remove("active"));
            document.getElementById(`btn-${mode}`).classList.add("active");
            if (mode === "explore") {
                board.style.display = "flex";
                quizPanel.style.display = "none";
                viewer.innerHTML = `<div class="empty-state" style="text-align: center; color: var(--text-muted);"><i class="bi bi-123" style="font-size: 3rem; color: var(--primary); display: block; opacity: 0.5;"></i><p>Selecciona un número</p></div>`;
            } else {
                board.style.display = "none";
                quizPanel.style.display = "block";
                currentScore = 0;
                nextQuestion();
            }
        }

        function nextQuestion() {
            document.getElementById("quiz-score").innerText = `Puntos: ${currentScore}`;
            currentTarget = numbers[Math.floor(Math.random() * numbers.length)];
            
            // Le pasamos 'true' porque ESTE SÍ es el quiz
            showImage(currentTarget, true); 
            
            quizOptions.innerHTML = "";
            let opts = [currentTarget];
            while (opts.length < 4) {
                let r = numbers[Math.floor(Math.random() * numbers.length)];
                if (!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            opts.forEach((opt) => {
                const btn = document.createElement("button");
                btn.className = "key-btn";
                btn.textContent = opt;
                btn.onclick = () => {
                    if (opt === currentTarget) {
                        currentScore++;
                        btn.style.background = "#10b981"; 
                        btn.style.color = "#fff";
                        setTimeout(nextQuestion, 600);
                    } else {
                        currentScore = Math.max(0, currentScore - 1);
                        btn.style.background = "#ef4444"; 
                        btn.style.color = "#fff";
                        document.getElementById("quiz-score").innerText = `Puntos: ${currentScore}`;
                        setTimeout(() => {
                            btn.style.background = "var(--card-bg)";
                            btn.style.color = "var(--text-main)";
                        }, 500);
                    }
                };
                quizOptions.appendChild(btn);
            });
        }
    </script>
</body>
</html>
