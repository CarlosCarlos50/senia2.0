<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeñIA - Juegos</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

    <style>
        :root {
            --bg-color: #0b2926;
            --primary: #2de0d4;
            --primary-glow: rgba(45, 224, 212, 0.4);
            --text-main: #ffffff;
            --text-muted: #8abeb9;
            --card-bg: #113b37;
            --nav-bg: #071f1c;
        }

        [data-theme="light"] {
            --bg-color: #f0f4f4;
            --primary: #1a9e95;
            --primary-glow: rgba(26, 158, 149, 0.2);
            --text-main: #1a2e2c;
            --text-muted: #5a7a76;
            --card-bg: #ffffff;
            --nav-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 20px;
            z-index: 1000;
            background: var(--card-bg);
            color: var(--primary);
            border: 1px solid var(--primary-glow);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0b2926;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }
        #splash-screen img { width: 250px; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; filter: drop-shadow(0 0 10px rgba(45, 224, 212, 0.4)); }
            100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px #2de0d4); }
        }
        .splash-hidden { opacity: 0; visibility: hidden; }

        #main-content {
            opacity: 0; transform: translateY(30px);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }
        #main-content.visible { opacity: 1; transform: translateY(0); }

        .page-header {
            padding: 30px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area img {
            height: 70px;
            width: auto;
        }
        .page-header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        main { padding: 10px 20px 100px; }

        .game-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 25px var(--primary-glow);
            border: 1px solid var(--primary-glow);
            margin-bottom: 25px;
            transition: background-color 0.4s ease;
        }
        .game-card h2 { margin: 0 0 5px; font-size: 1.5rem; color: var(--primary); }
        .game-card p { margin: 0 0 15px; font-size: 0.9rem; color: var(--text-muted); }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            gap: 10px;
        }
        .game-stats {
            display: flex;
            gap: 20px;
        }
        .game-stats span {
            background: var(--bg-color);
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: bold;
            color: var(--primary);
        }
        .level-badge {
            background: var(--primary);
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
        }
        .question-area {
            text-align: center;
            margin: 25px 0;
        }
        .question-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            background: var(--bg-color);
            margin-bottom: 20px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        .option-btn {
            background: var(--bg-color);
            border: 2px solid var(--primary-glow);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 120px;
        }
        .option-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }
        .game-feedback {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 15px 0;
            color: var(--primary);
        }
        .next-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .category-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        .cat-btn {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .cat-btn.active {
            background: var(--primary);
            color: #000;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: var(--nav-bg);
            display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid var(--primary-glow);
            border-top-left-radius: 24px; border-top-right-radius: 24px;
        }
        .nav-link {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--text-muted); font-size: 0.75rem; gap: 4px;
        }
        .nav-link.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-btn">
        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>

    <div id="splash-screen">
        <img src="155a4c37-5a91-4ec8-9a18-f3f6373fd043_inspyrenet.png" alt="Logo SeñIA">
    </div>

    <div id="main-content">
        <header class="page-header">
            <div class="logo-area">
                <img src="155a4c37-5a91-4ec8-9a18-f3f6373fd043_inspyrenet.png" alt="Logo SeñIA">
            </div>
            <p>Pon a prueba tus conocimientos con estos juegos interactivos</p>
        </header>

        <main>
            <section class="game-card">
                <h2>🎮 Minijuegos</h2>
                <p>Pon a prueba tus conocimientos con este quiz interactivo. ¡Acumula puntos y sube de nivel!</p>

                <div class="category-selector" id="categorySelector">
                    <button data-cat="alfabeto" class="cat-btn active">Abecedario</button>
                    <button data-cat="numeros" class="cat-btn">Números</button>
                    <button data-cat="colores" class="cat-btn">Colores</button>
                    <button data-cat="palabras" class="cat-btn">Palabras clave</button>
                </div>

                <div class="game-header">
                    <div class="game-stats">
                        <span>🏆 Puntos: <span id="puntos">0</span></span>
                        <span>🎯 Aciertos consecutivos: <span id="aciertos">0</span></span>
                    </div>
                    <div class="level-badge" id="levelBadge">Nivel 1</div>
                </div>

                <div class="question-area">
                    <img id="preguntaImg" class="question-img" src="assets/placeholder.jpg" alt="Seña">
                    <div id="preguntaTexto" style="font-size: 1.2rem; margin: 10px 0;">¿Qué seña es esta?</div>
                    <div id="opciones" class="options"></div>
                    <div id="feedback" class="game-feedback"></div>
                    <button id="siguientePregunta" class="next-btn" style="display: none;">Siguiente pregunta ➡️</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-link">
                <i class="bi bi-house-door-fill" style="font-size: 1.5rem;"></i>
                <span>Inicio</span>
            </a>
            <a href="juegos.html" class="nav-link active">
                <i class="bi bi-joystick" style="font-size: 1.5rem;"></i>
                <span>Juegos</span>
            </a>
        </nav>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const splash = document.getElementById("splash-screen");
            const mainContent = document.getElementById("main-content");
            setTimeout(() => {
                splash.classList.add("splash-hidden");
                mainContent.classList.add("visible");
            }, 2000);
        });

        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;
        themeBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
            }
        });

        // ==================== MINIJUEGO ====================
        // Base de datos inicial
        const preguntasDB = {
            alfabeto: [
                { img: "assets/quiz_A.png", palabra: "A" },
                { img: "assets/quiz_B.png", palabra: "B" },
                { img: "assets/quiz_C.png", palabra: "C" },
                { img: "assets/quiz_D.png", palabra: "D" },
                { img: "assets/quiz_E.png", palabra: "E" },
                { img: "assets/quiz_F.png", palabra: "F" },
                { img: "assets/quiz_G.png", palabra: "G" },
                { img: "assets/quiz_H.png", palabra: "H" },
                { img: "assets/quiz_I.png", palabra: "I" },
                { img: "assets/quiz_J.png", palabra: "J" },
                { img: "assets/quiz_K.png", palabra: "K" },
                { img: "assets/quiz_L.png", palabra: "L" },
                { img: "assets/quiz_M.png", palabra: "M" },
                { img: "assets/quiz_N.png", palabra: "N" },
                { img: "assets/quiz_Ñ.png", palabra: "Ñ" },
                { img: "assets/quiz_O.png", palabra: "O" },
                { img: "assets/quiz_P.png", palabra: "P" },
                { img: "assets/quiz_Q.png", palabra: "Q" },
                { img: "assets/quiz_R.png", palabra: "R" },
                { img: "assets/quiz_S.png", palabra: "S" },
                { img: "assets/quiz_T.png", palabra: "T" },
                { img: "assets/quiz_U.png", palabra: "U" },
                { img: "assets/quiz_V.png", palabra: "V" },
                { img: "assets/quiz_W.png", palabra: "W" },
                { img: "assets/quiz_X.png", palabra: "X" },
                { img: "assets/quiz_Y.png", palabra: "Y" },
                { img: "assets/quiz_Z.png", palabra: "Z" }

            ],
            numeros: [
                { img: "assets/quiz_1.jpeg", palabra: "1", opciones: ["1", "2", "3", "4"] },
                { img: "assets/quiz_2.jpeg", palabra: "2", opciones: ["2", "1", "3", "4"] },
                { img: "assets/quiz_3.jpeg", palabra: "3", opciones: ["3", "1", "2", "4"] },
                { img: "assets/quiz_4.jpeg", palabra: "4", opciones: ["4", "1", "2", "3"] }
            ],
            colores: [
                { img: "assets/rojo.jpeg", palabra: "Rojo", opciones: ["Rojo", "Azul", "Verde", "Amarillo"] },
                { img: "assets/azul.jpeg", palabra: "Azul", opciones: ["Azul", "Rojo", "Verde", "Amarillo"] },
                { img: "assets/verde.jpeg", palabra: "Verde", opciones: ["Verde", "Azul", "Rojo", "Amarillo"] },
                { img: "assets/amarillo.jpeg", palabra: "Amarillo", opciones: ["Amarillo", "Rojo", "Azul", "Verde"] }
            ],
            palabras: [
                { img: "assets/quiz_hola.jpg", palabra: "Hola", opciones: ["Hola", "Adiós", "Gracias", "Por favor"] },
                { img: "assets/quiz_adios.png", palabra: "Adiós", opciones: ["Adiós", "Hola", "Gracias", "Por favor"] },
                { img: "assets/quiz_gracias.png", palabra: "Gracias", opciones: ["Gracias", "Por favor", "Hola", "Adiós"] },
                { img: "assets/quiz_porfavor.jpg", palabra: "Por favor", opciones: ["Por favor", "Gracias", "Hola", "Adiós"] }
            ]
        };

        // Función para generar opciones aleatorias para el abecedario
        function generarOpcionesAlfabeto(letraCorrecta) {
            const todasLasLetras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            // Filtrar la letra correcta
            let otras = todasLasLetras.filter(l => l !== letraCorrecta);
            // Mezclar aleatoriamente y tomar las primeras 3
            for (let i = otras.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [otras[i], otras[j]] = [otras[j], otras[i]];
            }
            const opciones = [letraCorrecta, ...otras.slice(0, 3)];
            // Mezclar las opciones para que la correcta no esté siempre en la misma posición
            for (let i = opciones.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opciones[i], opciones[j]] = [opciones[j], opciones[i]];
            }
            return opciones;
        }

        // Reemplazar las preguntas del abecedario con opciones aleatorias
        preguntasDB.alfabeto = preguntasDB.alfabeto.map(p => ({
            img: p.img,
            palabra: p.palabra,
            opciones: generarOpcionesAlfabeto(p.palabra)
        }));

        let categoriaActual = "alfabeto";
        let preguntas = [...preguntasDB.alfabeto];
        let preguntaActualIndex = 0;
        let puntos = 0;
        let aciertosConsecutivos = 0;
        let nivel = 1;
        let esperandoRespuesta = true;
        let preguntaActual = null;

        const preguntaImg = document.getElementById("preguntaImg");
        const opcionesDiv = document.getElementById("opciones");
        const feedbackDiv = document.getElementById("feedback");
        const siguienteBtn = document.getElementById("siguientePregunta");
        const puntosSpan = document.getElementById("puntos");
        const aciertosSpan = document.getElementById("aciertos");
        const levelBadge = document.getElementById("levelBadge");

        const frasesNivel = {
            1: "✨ ¡Bienvenido! Sigue así. ✨",
            2: "🌟 ¡Muy bien! Estás aprendiendo rápido. 🌟",
            3: "⭐ ¡Excelente! Ya eres un conocedor. ⭐",
            4: "🏆 ¡Impresionante! Eres todo un experto. 🏆",
            5: "💎 ¡Maestro! Nivel máximo alcanzado. 💎"
        };

        function actualizarUI() {
            puntosSpan.textContent = puntos;
            aciertosSpan.textContent = aciertosConsecutivos;
            let nivelCalculado = Math.floor(aciertosConsecutivos / 5) + 1;
            if (nivelCalculado > 5) nivelCalculado = 5;
            nivel = nivelCalculado;
            levelBadge.textContent = `Nivel ${nivel}`;
        }

        function barajar(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function mostrarPregunta() {
            if (preguntaActualIndex >= preguntas.length) {
                barajar(preguntas);
                preguntaActualIndex = 0;
            }
            preguntaActual = preguntas[preguntaActualIndex];
            preguntaImg.src = preguntaActual.img;
            preguntaImg.onerror = () => { preguntaImg.src = "https://placehold.co/200x200/0b2926/2de0d4?text=Seña"; };
            document.getElementById("preguntaTexto").textContent = "¿Qué seña es esta?";
            opcionesDiv.innerHTML = "";
            preguntaActual.opciones.forEach(op => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.textContent = op;
                btn.addEventListener("click", () => verificarRespuesta(op, btn));
                opcionesDiv.appendChild(btn);
            });
            feedbackDiv.textContent = "";
            siguienteBtn.style.display = "none";
            esperandoRespuesta = true;
        }

        function verificarRespuesta(respuesta, btn) {
            if (!esperandoRespuesta) return;
            if (respuesta === preguntaActual.palabra) {
                puntos += 10;
                aciertosConsecutivos++;
                feedbackDiv.innerHTML = "✅ ¡Correcto! +10 puntos 🎉";
                if (aciertosConsecutivos % 5 === 0) {
                    let nivelNuevo = Math.floor(aciertosConsecutivos / 5) + 1;
                    if (nivelNuevo <= 5) {
                        feedbackDiv.innerHTML += `<br>${frasesNivel[nivelNuevo]}`;
                    } else {
                        feedbackDiv.innerHTML += "<br>🏆 ¡Eres un campeón! 🏆";
                    }
                }
                esperandoRespuesta = false;
                siguienteBtn.style.display = "block";
            } else {
                puntos = Math.max(0, puntos - 5);
                aciertosConsecutivos = 0;
                feedbackDiv.innerHTML = "❌ Incorrecto. ¡Sigue practicando!";
                esperandoRespuesta = false;
                siguienteBtn.style.display = "block";
            }
            actualizarUI();
            document.querySelectorAll(".option-btn").forEach(b => b.style.pointerEvents = "none");
        }

        function siguientePregunta() {
            preguntaActualIndex++;
            mostrarPregunta();
            document.querySelectorAll(".option-btn").forEach(b => b.style.pointerEvents = "auto");
        }

        function cambiarCategoria(categoria) {
            categoriaActual = categoria;
            switch (categoria) {
                case "alfabeto": preguntas = [...preguntasDB.alfabeto]; break;
                case "numeros": preguntas = [...preguntasDB.numeros]; break;
                case "colores": preguntas = [...preguntasDB.colores]; break;
                case "palabras": preguntas = [...preguntasDB.palabras]; break;
                default: preguntas = [...preguntasDB.alfabeto];
            }
            barajar(preguntas);
            preguntaActualIndex = 0;
            puntos = 0;
            aciertosConsecutivos = 0;
            actualizarUI();
            mostrarPregunta();
            document.querySelectorAll(".cat-btn").forEach(btn => {
                if (btn.dataset.cat === categoria) btn.classList.add("active");
                else btn.classList.remove("active");
            });
        }

        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", () => cambiarCategoria(btn.dataset.cat));
        });
        siguienteBtn.addEventListener("click", siguientePregunta);

        barajar(preguntas);
        mostrarPregunta();
    </script>
</body>
</html>
